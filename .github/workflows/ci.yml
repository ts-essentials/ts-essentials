name: CI

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  test:
    name: Test
    strategy:
      matrix:
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          registry-url: "https://registry.npmjs.org"

      - run: npm --version
      - run: node --version

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
          key: ${{ runner.OS }}-${{ hashFiles('.nvmrc') }}-npm-cache-${{ hashFiles('package-lock.json') }}
          restore-keys: ${{ runner.OS }}-${{ hashFiles('.nvmrc') }}-npm-cache-

      - run: npm ci
      - run: npm test
      - run: npm run build
