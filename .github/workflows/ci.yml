name: CI

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  test:
    name: Test
    strategy:
      matrix:
        node: ["24.x"]
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v1
      - uses: actions/setup-node@v1
        with:
          node-version: ${{ matrix.node }}

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
          key: ${{ runner.OS }}-${{ matrix.node }}-npm-cache-${{ hashFiles('package-lock.json') }}
          restore-keys: ${{ runner.OS }}-${{ matrix.node }}-npm-cache-

      - run: npm ci

      - run: npm run test
      - run: npm run build
